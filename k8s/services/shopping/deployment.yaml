apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-deploy
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopping
  template:
    metadata:
      labels:
        app: shopping
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: shopping
          image: tharanga123acr.azurecr.io/tharanga123acr.azurecr.io/tharanga123acr.azurecr.io/ecommerce/shopping:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: shopping-secret
                  key: MONGO_USER
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: shopping-secret
                  key: MONGO_PASS
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopping-secret
                  key: APP_SECRET
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopping-config
                  key: MONGO_HOST
            - name: MONGO_PORT
              valueFrom:
                configMapKeyRef:
                  name: shopping-config
                  key: MONGO_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: shopping-config
                  key: DB_NAME
            - name: MONGODB_URI
              value: "mongodb://$(MONGO_USER):$(MONGO_PASS)@$(MONGO_HOST):$(MONGO_PORT)/$(DB_NAME)?authSource=admin"
          envFrom:
            - configMapRef:
                name: shopping-config
