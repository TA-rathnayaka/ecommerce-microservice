name: Build and Deploy to Azure AKS

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "full | --app-only | --images-only"
        required: false
        default: "full"

env:
  AZURE_RESOURCE_GROUP: rg-ecommerce
  ACR_NAME: ${{ secrets.ACR_NAME }}
  TF_VERSION: "1.7.0"
  # Force GitHub to use Node.js 24 to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Step 1 & 2: Build and push all container images
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_mode != '--app-only' }}
    strategy:
      matrix:
        include:
          - service: customer
            context: ./backend/customer
            dockerfile: ./backend/customer/Dockerfile
            image: ecommerce/customer
          - service: products
            context: ./backend/products
            dockerfile: ./backend/products/Dockerfile
            image: ecommerce/products
          - service: shopping
            context: ./backend/shopping
            dockerfile: ./backend/shopping/Dockerfile
            image: ecommerce/shopping
          - service: proxy
            context: ./backend/proxy
            dockerfile: ./backend/proxy/Dockerfile.prod
            image: ecommerce/proxy
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ecommerce/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check Secrets
        run: |
          echo "Checking if Azure Secrets are present..."
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then echo "❌ AZURE_CLIENT_ID is MISSING"; fi
          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ]; then echo "❌ AZURE_TENANT_ID is MISSING"; fi
          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then echo "❌ AZURE_SUBSCRIPTION_ID is MISSING"; fi

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:${GITHUB_SHA::7}"
          IMAGE_LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:latest"

          docker build \
            --platform linux/amd64 \
            -f ${{ matrix.dockerfile }} \
            -t "$IMAGE_TAG" \
            -t "$IMAGE_LATEST" \
            ${{ matrix.context }}

          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

  # ──────────────────────────────────────────────────────────────────────────
  # Step 3: Provision / Update Infrastructure
  # ──────────────────────────────────────────────────────────────────────────
  terraform:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() && (github.event.inputs.deploy_mode == 'full' || github.event.inputs.deploy_mode == '') }}
    defaults:
      run:
        working-directory: azure
    outputs:
      acr_server: ${{ steps.tf_outputs.outputs.acr_server }}
      aks_cluster: ${{ steps.tf_outputs.outputs.aks_cluster }}
      rg: ${{ steps.tf_outputs.outputs.rg }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -upgrade
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="acr_name=${{ env.ACR_NAME }}" \
            -var="app_secret=${{ secrets.APP_SECRET }}" \
            -var-file="terraform.tfvars"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Capture Outputs
        id: tf_outputs
        run: |
          echo "acr_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "aks_cluster=$(terraform output -raw aks_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "rg=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

  # ──────────────────────────────────────────────────────────────────────────
  # Step 4: Deploy App & Setup HTTPS
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build, terraform]
    if: ${{ always() && github.event.inputs.deploy_mode != '--images-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        run: |
          RG="${{ needs.terraform.outputs.rg || env.AZURE_RESOURCE_GROUP }}"
          CLUSTER="${{ needs.terraform.outputs.aks_cluster || 'aks-ecommerce' }}"
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing

      - name: Patch Image Tags
        run: |
          ACR_SERVER="${{ needs.terraform.outputs.acr_server || secrets.ACR_LOGIN_SERVER }}"
          TAG="${GITHUB_SHA::7}"
          find k8s -name "*.yaml" | xargs sed -i "s|image: ecommerce/|image: $ACR_SERVER/ecommerce/|g"
          # Only use hash tag if we built images in this run
          if [[ "${{ github.event.inputs.deploy_mode }}" != "--app-only" ]]; then
            find k8s -name "*.yaml" | xargs sed -i "s|/ecommerce/\(.*\):latest|/ecommerce/\1:$TAG|g"
          fi

      - name: Deploy Core App
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/infrastructure/storage-class.yaml
          kubectl apply -f k8s/infrastructure/mongodb/
          kubectl apply -f k8s/infrastructure/rabbitmq/
          
          # Wait for DBs
          kubectl rollout status deployment/products-db -n ecommerce --timeout=120s
          kubectl rollout status deployment/customer-db -n ecommerce --timeout=120s
          
          kubectl apply -f k8s/services/customer/
          kubectl apply -f k8s/services/products/
          kubectl apply -f k8s/services/shopping/
          kubectl apply -f k8s/gateway/proxy.yaml
          kubectl apply -f k8s/gateway/frontend.yaml

      - name: Setup Ingress & HTTPS
        id: ingress
        run: |
          # Install Ingress Nginx
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
          
          echo "Waiting for Ingress IP..."
          INGRESS_IP=""
          for i in {1..30}; do
            INGRESS_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ ! -z "$INGRESS_IP" ]; then break; fi
            sleep 10
          done
          
          if [ -z "$INGRESS_IP" ]; then echo "Timeout waiting for Ingress IP"; exit 1; fi
          
          DOMAIN="${INGRESS_IP}.nip.io"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          
          # Install cert-manager
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=120s
          
          # Apply HTTPS manifests
          kubectl apply -f k8s/gateway/cluster-issuer.yaml
          sed "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" k8s/gateway/ingress.yaml | kubectl apply -f -
          
          # Inject HTTPS URL into Frontend
          kubectl set env deployment/frontend-deploy -n ecommerce PROXY_IP="https://${DOMAIN}/api"
          kubectl rollout restart deployment/frontend-deploy -n ecommerce

      - name: Deployment Summary
        run: |
          DOMAIN="${{ steps.ingress.outputs.domain }}"
          echo "## 🚀 Deployment Complete!" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ **Website:** [https://$DOMAIN](https://$DOMAIN)" >> "$GITHUB_STEP_SUMMARY"
          echo "🔌 **API:** [https://$DOMAIN/api](https://$DOMAIN/api)" >> "$GITHUB_STEP_SUMMARY"
          echo "🏷️ **Tag:** \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"