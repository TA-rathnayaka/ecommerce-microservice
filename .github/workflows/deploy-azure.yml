name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-ecommerce
  ACR_NAME: ${{ secrets.ACR_NAME }}
  TF_VERSION: "1.7.0"

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build and push all container images
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: customer
            context: ./backend/customer
            dockerfile: ./backend/customer/Dockerfile
            image: ecommerce/customer
          - service: products
            context: ./backend/products
            dockerfile: ./backend/products/Dockerfile
            image: ecommerce/products
          - service: shopping
            context: ./backend/shopping
            dockerfile: ./backend/shopping/Dockerfile
            image: ecommerce/shopping
          - service: proxy
            context: ./backend/proxy
            dockerfile: ./backend/proxy/Dockerfile.prod
            image: ecommerce/proxy
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ecommerce/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:latest"

          BUILD_ARGS=""
          if [ "${{ matrix.service }}" == "frontend" ]; then
            BUILD_ARGS="--build-arg REACT_APP_API_BASE_URL=${{ secrets.API_BASE_URL }}"
          fi

          docker build \
            -f ${{ matrix.dockerfile }} \
            $BUILD_ARGS \
            -t $IMAGE_TAG \
            -t $IMAGE_LATEST \
            ${{ matrix.context }}

          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy infrastructure with Terraform
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: azure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="acr_name=${{ env.ACR_NAME }}" \
            -var="mongodb_connection_string=${{ secrets.MONGODB_CONNECTION_STRING }}" \
            -var="app_secret=${{ secrets.APP_SECRET }}" \
            -var="image_tag=${{ github.sha }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Get deployment URLs
        run: |
          FRONTEND_FQDN=$(terraform output -raw frontend_url)
          API_FQDN=$(terraform output -raw api_gateway_url)

          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_FQDN |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | $API_FQDN |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
