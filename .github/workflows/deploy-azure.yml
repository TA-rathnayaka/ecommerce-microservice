name: Build and Deploy to Azure AKS

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "full | --app-only | --images-only"
        required: false
        default: "full"

env:
  AZURE_RESOURCE_GROUP: rg-ecommerce
  ACR_NAME: ${{ secrets.ACR_NAME }}
  TF_VERSION: "1.7.0"

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build and push all container images
  # Skipped when deploy_mode is --app-only
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_mode != '--app-only' }}
    strategy:
      matrix:
        include:
          - service: customer
            context: ./backend/customer
            dockerfile: ./backend/customer/Dockerfile
            image: ecommerce/customer
          - service: products
            context: ./backend/products
            dockerfile: ./backend/products/Dockerfile
            image: ecommerce/products
          - service: shopping
            context: ./backend/shopping
            dockerfile: ./backend/shopping/Dockerfile
            image: ecommerce/shopping
          - service: proxy
            context: ./backend/proxy
            dockerfile: ./backend/proxy/Dockerfile.prod   # matches setup.sh
            image: ecommerce/proxy
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ecommerce/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:latest"

          BUILD_ARGS=""
          if [ "${{ matrix.service }}" == "frontend" ]; then
            # First pass: placeholder URL — rebuilt with real IP after deploy
            BUILD_ARGS="--build-arg REACT_APP_API_BASE_URL=http://PROXY_IP:8000"
          fi

          docker build \
            -f ${{ matrix.dockerfile }} \
            $BUILD_ARGS \
            -t "$IMAGE_TAG" \
            -t "$IMAGE_LATEST" \
            ${{ matrix.context }}

          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

  # ──────────────────────────────────────────────────────────────────────────
  # Provision AKS + ACR with Terraform
  # Skipped when deploy_mode is --images-only or --app-only
  # ──────────────────────────────────────────────────────────────────────────
  terraform:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() && github.event.inputs.deploy_mode == 'full' || github.event.inputs.deploy_mode == '' }}
    defaults:
      run:
        working-directory: azure
    outputs:
      acr_login_server: ${{ steps.tf_outputs.outputs.acr_login_server }}
      acr_name: ${{ steps.tf_outputs.outputs.acr_name }}
      aks_cluster_name: ${{ steps.tf_outputs.outputs.aks_cluster_name }}
      resource_group_name: ${{ steps.tf_outputs.outputs.resource_group_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false   # required for clean `terraform output` parsing

      - name: Terraform Init
        run: terraform init -upgrade
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="acr_name=${{ env.ACR_NAME }}" \
            -var="app_secret=${{ secrets.APP_SECRET }}" \
            -var="image_tag=${{ github.sha }}" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Capture Terraform outputs
        id: tf_outputs
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(terraform output -raw acr_name)"                 >> "$GITHUB_OUTPUT"
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

  # ──────────────────────────────────────────────────────────────────────────
  # Patch K8s manifests, deploy to AKS, rebuild frontend with real proxy IP
  # Skipped when deploy_mode is --images-only
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build, terraform]
    if: ${{ always() && github.event.inputs.deploy_mode != '--images-only' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Resolve infra values: prefer terraform job outputs, fall back to secrets
      # (needed when running --app-only, which skips the terraform job)
      - name: Resolve infra values
        id: infra
        run: |
          ACR_SERVER="${{ needs.terraform.outputs.acr_login_server }}"
          ACR_NAME_OUT="${{ needs.terraform.outputs.acr_name }}"
          AKS_CLUSTER="${{ needs.terraform.outputs.aks_cluster_name }}"
          RG="${{ needs.terraform.outputs.resource_group_name }}"

          # Fall back to secrets for partial-deploy modes
          ACR_SERVER="${ACR_SERVER:-${{ secrets.ACR_LOGIN_SERVER }}}"
          ACR_NAME_OUT="${ACR_NAME_OUT:-${{ env.ACR_NAME }}}"
          AKS_CLUSTER="${AKS_CLUSTER:-${{ secrets.AKS_CLUSTER_NAME }}}"
          RG="${RG:-${{ env.AZURE_RESOURCE_GROUP }}}"

          echo "acr_server=$ACR_SERVER"   >> "$GITHUB_OUTPUT"
          echo "acr_name=$ACR_NAME_OUT"   >> "$GITHUB_OUTPUT"
          echo "aks_cluster=$AKS_CLUSTER" >> "$GITHUB_OUTPUT"
          echo "rg=$RG"                   >> "$GITHUB_OUTPUT"

      # Mirrors setup.sh Step 3: sed-replace 'ecommerce/' with full ACR path
      - name: Patch image names in K8s manifests
        run: |
          find k8s -name "*.yaml" | xargs \
            sed -i "s|ecommerce/|${{ steps.infra.outputs.acr_server }}/ecommerce/|g"

      # Mirrors setup.sh Step 4
      - name: Configure kubectl
        run: |
          az aks get-credentials \
            --resource-group "${{ steps.infra.outputs.rg }}" \
            --name "${{ steps.infra.outputs.aks_cluster }}" \
            --overwrite-existing

      # Mirrors setup.sh Step 5 — same apply order, same rollout waits
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/infrastructure/storage-class.yaml
          kubectl apply -f k8s/infrastructure/mongodb/
          kubectl apply -f k8s/infrastructure/rabbitmq/

          echo "Waiting for infrastructure rollouts..."
          kubectl rollout status deployment/products-db -n ecommerce --timeout=120s
          kubectl rollout status deployment/customer-db -n ecommerce --timeout=120s
          kubectl rollout status deployment/shopping-db -n ecommerce --timeout=120s
          kubectl rollout status deployment/rabbitmq    -n ecommerce --timeout=120s

          kubectl apply -f k8s/services/customer/
          kubectl apply -f k8s/services/products/
          kubectl apply -f k8s/services/shopping/
          kubectl apply -f k8s/gateway/

      # Mirrors setup.sh Step 6 — wait for LB IPs, rebuild frontend with real proxy IP
      - name: Wait for external IPs
        id: ips
        run: |
          echo "Waiting for LoadBalancer IPs (up to 3 min)..."
          kubectl wait --for=jsonpath='{.status.loadBalancer.ingress}' \
            service/proxy    -n ecommerce --timeout=180s || true
          kubectl wait --for=jsonpath='{.status.loadBalancer.ingress}' \
            service/frontend -n ecommerce --timeout=180s || true

          PROXY_IP=$(kubectl get svc proxy -n ecommerce \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          FRONTEND_IP=$(kubectl get svc frontend -n ecommerce \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")

          echo "proxy_ip=$PROXY_IP"       >> "$GITHUB_OUTPUT"
          echo "frontend_ip=$FRONTEND_IP" >> "$GITHUB_OUTPUT"

      - name: Rebuild frontend with real proxy IP
        if: ${{ steps.ips.outputs.proxy_ip != 'pending' }}
        run: |
          ACR_SERVER="${{ steps.infra.outputs.acr_server }}"
          ACR_NAME="${{ steps.infra.outputs.acr_name }}"
          PROXY_IP="${{ steps.ips.outputs.proxy_ip }}"

          az acr login --name "$ACR_NAME"

          docker build \
            --build-arg REACT_APP_API_BASE_URL="http://${PROXY_IP}:8000" \
            -t "${ACR_SERVER}/ecommerce/frontend:latest" \
            -t "${ACR_SERVER}/ecommerce/frontend:${{ github.sha }}" \
            ./frontend

          docker push "${ACR_SERVER}/ecommerce/frontend:latest"
          docker push "${ACR_SERVER}/ecommerce/frontend:${{ github.sha }}"

          kubectl rollout restart deployment/frontend-deploy -n ecommerce
          kubectl rollout status  deployment/frontend-deploy -n ecommerce --timeout=120s

      - name: Summary
        run: |
          PROXY_IP="${{ steps.ips.outputs.proxy_ip }}"
          FRONTEND_IP="${{ steps.ips.outputs.frontend_ip }}"

          echo "## Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend   | http://${FRONTEND_IP} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API gateway | http://${PROXY_IP}:8000 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**ACR:** \`${{ steps.infra.outputs.acr_server }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**AKS cluster:** \`${{ steps.infra.outputs.aks_cluster }}\`" >> "$GITHUB_STEP_SUMMARY"