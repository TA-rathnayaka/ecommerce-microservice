name: Build and Deploy to Azure AKS

on:
  push:
    branches: ["main", "sonna-issues"]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "full | --app-only | --images-only"
        required: false
        default: "full"
      skip_terraform:
        description: "Skip infrastructure provisioning (if already created)"
        required: false
        default: "true"

env:
  AZURE_RESOURCE_GROUP: rg-ecommerce
  ACR_NAME: ${{ secrets.ACR_NAME || vars.ACR_NAME }}
  TF_VERSION: "1.7.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Step 1: Parallel Code Quality
  # ──────────────────────────────────────────────────────────────────────────
  sonarqube:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Step 2: Parallel Builds
  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: ${{ github.event.inputs.deploy_mode != '--app-only' }}
    strategy:
      matrix:
        include:
          - service: customer
            context: ./backend/customer
            dockerfile: ./backend/customer/Dockerfile
            image: ecommerce/customer
          - service: products
            context: ./backend/products
            dockerfile: ./backend/products/Dockerfile
            image: ecommerce/products
          - service: shopping
            context: ./backend/shopping
            dockerfile: ./backend/shopping/Dockerfile
            image: ecommerce/shopping
          - service: proxy
            context: ./backend/proxy
            dockerfile: ./backend/proxy/Dockerfile.prod
            image: ecommerce/proxy
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ecommerce/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }}
        run: |
          TAG="${{ steps.vars.outputs.sha_short }}"
          IMAGE_TAG="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:$TAG"
          IMAGE_LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:latest"

          docker build --platform linux/amd64 -f ${{ matrix.dockerfile }} -t "$IMAGE_TAG" -t "$IMAGE_LATEST" ${{ matrix.context }}
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

  # ──────────────────────────────────────────────────────────────────────────
  # Step 3: Optional Infrastructure (Manual Only)
  # ──────────────────────────────────────────────────────────────────────────
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_terraform == 'false' }}
    defaults:
      run:
        working-directory: azure
    outputs:
      acr_server: ${{ steps.tf_outputs.outputs.acr_server }}
      aks_cluster: ${{ steps.tf_outputs.outputs.aks_cluster }}
      rg: ${{ steps.tf_outputs.outputs.rg }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Terraform Init
        run: terraform init -upgrade
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -var="acr_name=${{ env.ACR_NAME }}" -var="app_secret=${{ secrets.APP_SECRET }}" -var-file="terraform.tfvars"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Capture Outputs
        id: tf_outputs
        run: |
          echo "acr_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "aks_cluster=$(terraform output -raw aks_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "rg=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ──────────────────────────────────────────────────────────────────────────
  # Step 4: Core Infrastructure Prep (Serial)
  # ──────────────────────────────────────────────────────────────────────────
  infra_prep:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: [build, terraform]
    if: ${{ always() && github.event.inputs.deploy_mode != '--images-only' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      - name: Set AKS Context
        run: |
          RG="${{ needs.terraform.outputs.rg || env.AZURE_RESOURCE_GROUP }}"
          CLUSTER="${{ needs.terraform.outputs.aks_cluster || 'aks-ecommerce' }}"
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing
      - name: Apply Base Resources
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/infrastructure/storage-class.yaml
          kubectl apply -f k8s/infrastructure/mongodb/
          kubectl apply -f k8s/infrastructure/rabbitmq/
          kubectl rollout status deployment/products-db -n ecommerce --timeout=120s

  # ──────────────────────────────────────────────────────────────────────────
  # Step 5: Parallel Service Deployment
  # ──────────────────────────────────────────────────────────────────────────
  deploy_services:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: [infra_prep, build, terraform]
    strategy:
      matrix:
        service_dir: [customer, products, shopping, proxy, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      - name: Set AKS Context
        run: |
          RG="${{ needs.terraform.outputs.rg || env.AZURE_RESOURCE_GROUP }}"
          CLUSTER="${{ needs.terraform.outputs.aks_cluster || 'aks-ecommerce' }}"
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing
      
      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Patch & Deploy ${{ matrix.service_dir }}
        run: |
          ACR_SERVER="${{ needs.terraform.outputs.acr_server || secrets.ACR_LOGIN_SERVER || format('{0}.azurecr.io', env.ACR_NAME) }}"
          TAG="${{ steps.vars.outputs.sha_short }}"
          
          # Target only this service's directory
          MANIFEST_DIR="k8s/gateway"
          if [[ "${{ matrix.service_dir }}" != "proxy" && "${{ matrix.service_dir }}" != "frontend" ]]; then
            MANIFEST_DIR="k8s/services/${{ matrix.service_dir }}"
          else
            MANIFEST_DIR="k8s/gateway/${{ matrix.service_dir }}.yaml"
          fi
          
          find $MANIFEST_DIR -name "*.yaml" | xargs sed -i "s|image: ecommerce/|image: $ACR_SERVER/ecommerce/|g"
          find $MANIFEST_DIR -name "*.yaml" | xargs sed -i "s|/ecommerce/\(.*\):latest|/ecommerce/\1:$TAG|g"
          
          kubectl apply -f $MANIFEST_DIR

  # ──────────────────────────────────────────────────────────────────────────
  # Step 6: Final HTTPS & Ingress (Serial)
  # ──────────────────────────────────────────────────────────────────────────
  ingress_final:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: [deploy_services, terraform]
    outputs:
      domain: ${{ steps.ingress.outputs.domain }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      - name: Set AKS Context
        run: |
          RG="${{ needs.terraform.outputs.rg || env.AZURE_RESOURCE_GROUP }}"
          CLUSTER="${{ needs.terraform.outputs.aks_cluster || 'aks-ecommerce' }}"
          az aks get-credentials --resource-group "$RG" --name "$CLUSTER" --overwrite-existing
      
      - name: Setup Ingress & HTTPS
        id: ingress
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
          
          INGRESS_IP=""
          for i in {1..30}; do
            INGRESS_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ ! -z "$INGRESS_IP" ]; then break; fi
            sleep 10
          done
          
          DOMAIN="${INGRESS_IP}.nip.io"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=120s
          
          kubectl apply -f k8s/gateway/cluster-issuer.yaml
          sed "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" k8s/gateway/ingress.yaml | kubectl apply -f -
          
          # Inject HTTPS URL into Frontend
          kubectl set env deployment/frontend-deploy -n ecommerce PROXY_IP="https://${DOMAIN}/api"
          kubectl rollout restart deployment/frontend-deploy -n ecommerce

      - name: Deployment Summary
        run: |
          DOMAIN="${{ steps.ingress.outputs.domain }}"
          echo "## 🚀 Ultimate Parallel Deployment Complete!" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ **Website:** [https://$DOMAIN](https://$DOMAIN)" >> "$GITHUB_STEP_SUMMARY"
          echo "🔌 **API:** [https://$DOMAIN/api](https://$DOMAIN/api)" >> "$GITHUB_STEP_SUMMARY"